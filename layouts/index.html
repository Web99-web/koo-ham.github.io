{{ define "main" }}


<section class="hero">
  <div class="container">
    <h1>{{ .Title }}</h1>
    <p>{{ .Content }}</p>
  </div>
</section>

<main class="container">

<section id="slatko">
  <h2>{{ i18n "slatko" }}</h2>

<div class="recipe-grid">
  {{ range first 6 (where .Site.RegularPages "Params.category" "eq" "slatko") }}

<a href="{{ .RelPermalink }}" class="recipe-card fade-in">

  <span class="card-badge">{{ .Params.category }}</span>

  <img src="{{ .Params.image | relURL }}" alt="{{ .Title }}" class="card-image">

  <h3 class="card-title">{{ .Title }}</h3>

</a>

{{ end }}
</div>

</section>

</section>

  <section id="slano">
    <h2>Slano</h2>
  </section>

  <section id="tradicionalno">
    <h2>Tradicionalno</h2>
  </section>

  <section id="strano">
    <h2>Strano</h2>
  </section>

  <section id="savjeti">
    <h2>Savjeti u kuhinji</h2>
  </section>

</main>

{{ partial "footer.html" . }}
{{ end }}
