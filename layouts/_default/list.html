{{ define "main" }}

<h1>{{ .Title }}</h1>

<div class="recipe-grid">

  {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="recipe-card">

      {{ with .Params.image }}
        <img src="{{ . | relURL }}" alt="{{ .Title }}" class="card-image">
      {{ end }}

      <div class="card-title">
        {{ .Title }}
      </div>

    </a>
  {{ end }}

</div>

{{ end }}
