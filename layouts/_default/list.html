{{ define "main" }}
TEST123
<section class="container">

  <h1>{{ .Title }}</h1>

  {{ if .Content }}
    <p class="section-desc">{{ .Content }}</p>
  {{ end }}

  {{ with .Params.image }}
    <img src="{{ . | absURL }}" class="category-hero">
  {{ end }}

  <div class="recipe-grid">

    {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="recipe-card">

        {{ with .Params.image }}
          <img src="{{ . | relURL }}" alt="{{ $.Title }}">
        {{ end }}

        <h3>{{ .Title }}</h3>

      </a>
    {{ end }}

  </div>

</section>

{{ end }}
