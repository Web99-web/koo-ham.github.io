{{ define "main" }}

<h1>{{ .Title }}</h1>

<div class="recipe-grid">

  {{ range .RegularPages }}
    <a href="{{ .RelPermalink }}" class="recipe-card">

      <img src="{{ .Params.image | relURL }}" class="card-image">

      <div class="card-title">
        {{ .Title }}
      </div>

    </a>
  {{ end }}

</div>

{{ end }}
