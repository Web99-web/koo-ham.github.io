
{{ define "main" }}

<h1>{{ .Title }}</h1>

<div class="recipe-grid">

  {{ range .Pages }}
    <div class="recipe-card">
      
      <a href="{{ .RelPermalink }}">
        
        {{ with .Params.image }}
          <img src="/koo-ham.github.io{{ . }}" alt="{{ $.Title }}" class="recipe-thumb">
        {{ end }}

        <h3>{{ .Title }}</h3>

      </a>

    </div>
  {{ end }}

</div>

{{ end }}
