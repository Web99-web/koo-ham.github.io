{{ define "main" }}

<h1>{{ .Title }}</h1>

<div>

  {{ range .RegularPages }}
    
    <div style="margin-bottom:20px;">

      <a href="{{ .RelPermalink }}">
        
        {{ if .Params.image }}
          <img src="{{ .Params.image | relURL }}" style="width:200px;">
        {{ else }}
          <p>NO IMAGE</p>
        {{ end }}

        <p>{{ .Title }}</p>

      </a>

    </div>

  {{ end }}

</div>

{{ end }}
