{{ define "main" }}

<h1>{{ .Title }}</h1>

<div class="recipe-grid">

  {{ range .RegularPages }}
    {{ $img := .Params.thumbnail | default .Params.featured_image | default .Params.image_url }}

    <a href="{{ .RelPermalink }}" class="recipe-card">

      <img src="{{ $img | relURL }}" 
           alt="{{ .Params.image_alt }}" 
           class="card-image">

      <div class="card-title">
        {{ .Title }}
      </div>

    </a>
  {{ end }}

</div>

{{ end }}
