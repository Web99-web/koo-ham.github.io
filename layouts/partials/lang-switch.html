<div class="lang-switch">
<span style="color:red;">NEW SWITCH</span>
  {{ if .IsTranslated }}

    {{ range .Translations }}
      <a href="{{ .Permalink }}">
        {{ if eq .Lang "hr" }}🇭🇷 HR{{ else }}🇬🇧 EN{{ end }}
      </a>
    {{ end }}

  {{ else }}

    {{ if eq .Lang "hr" }}
      <a href="{{ printf "%sen/" .Site.BaseURL }}">🇬🇧 EN</a>
    {{ else }}
      <a href="{{ .Site.BaseURL }}">🇭🇷 HR</a>
    {{ end }}

  {{ end }}

</div>
